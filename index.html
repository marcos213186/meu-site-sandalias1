<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Store | Calçados Femininos</title>
    <style>
        /* Cores da Identidade: Rosa Boutique & Branco Puro */
        :root {
            --rosa-principal: #ff8fa3;
            --rosa-escuro: #ff4d6d;
            --rosa-claro: #fff0f3;
            --branco: #ffffff;
            --texto-escuro: #2b2d42;
            --texto-suave: #6c757d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--rosa-claro);
            color: var(--texto-escuro);
            -webkit-font-smoothing: antialiased;
        }

        /* Topo Premium Ajustado para Celular e Computador */
        header {
            background-color: var(--branco);
            text-align: center;
            padding: 40px 20px;
            box-shadow: 0 4px 20px rgba(255, 143, 163, 0.15);
            border-bottom: 1px solid rgba(255, 143, 163, 0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        header .logo-borboleta {
            width: 65px;
            height: auto;
            fill: var(--rosa-principal);
        }

        header .nome-loja {
            color: var(--texto-escuro);
            font-size: 2.4rem;
            letter-spacing: 6px;
            font-weight: 800;
            text-transform: uppercase;
            margin: 0;
        }

        header .subtitulo {
            font-size: 0.9rem;
            color: var(--rosa-escuro);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
            display: block;
            font-weight: 600;
        }

        .carrinho-topo-btn {
            position: absolute;
            top: 40px;
            right: 40px;
            background-color: var(--rosa-principal);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(255, 143, 163, 0.3);
            transition: all 0.2s ease;
        }

        .carrinho-topo-btn:hover {
            background-color: var(--rosa-escuro);
        }

        .contador-itens {
            background-color: white;
            color: var(--rosa-escuro);
            border-radius: 50%;
            padding: 2px 7px;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            header {
                padding: 30px 20px 80px 20px;
            }
            .carrinho-topo-btn {
                position: absolute;
                top: auto;
                bottom: 20px;
                right: 50%;
                transform: translateX(50%);
                width: auto;
            }
            header .nome-loja {
                font-size: 2rem;
            }
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Vitrine Profissional com Grid Moderno */
        .vitrine {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .produto-card {
            background-color: var(--branco);
            border: 1px solid rgba(255, 143, 163, 0.2);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 143, 163, 0.08);
            padding: 30px 20px;
            text-align: center;
            box-sizing: border-box;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .produto-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(255, 143, 163, 0.2);
            border-color: var(--rosa-principal);
        }

        .img-container {
            width: 100%;
            height: auto;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .produto-card img {
            max-width: 55%;
            height: auto;
            border-radius: 12px;
            display: block;
        }

        .produto-card h3 {
            margin: 15px 0 8px 0;
            font-size: 1.4rem;
            color: var(--texto-escuro);
            font-weight: 700;
        }

            font-size: 0.85rem;
            color: var(--rosa-escuro);
            text-transform: uppercase

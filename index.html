<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Store | Calçados Femininos</title>
    
    <style>
        :root {
            --rosa-principal: #ff8fa3;
            --rosa-escuro: #ff4d6d;
            --rosa-claro: #fff0f3;
            --branco: #ffffff;
            --texto-escuro: #2b2d42;
            --texto-suave: #6c757d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--rosa-claro);
            color: var(--texto-escuro);
            -webkit-font-smoothing: antialiased;
        }

        header {
            background-color: var(--branco);
            text-align: center;
            padding: 40px 20px;
            box-shadow: 0 4px 20px rgba(255, 143, 163, 0.15);
            border-bottom: 1px solid rgba(255, 143, 163, 0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        header .logo-borboleta {
            width: 65px;
            height: auto;
            fill: var(--rosa-principal);
        }

        header .nome-loja {
            color: var(--texto-escuro);
            font-size: 2.4rem;
            letter-spacing: 6px;
            font-weight: 800;
            text-transform: uppercase;
            margin: 0;
        }

        header .subtitulo {
            font-size: 0.9rem;
            color: var(--rosa-escuro);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
            display: block;
            font-weight: 600;
        }

        .carrinho-topo-btn {
            position: absolute;
            top: 40px;
            right: 40px;
            background-color: var(--rosa-principal);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(255, 143, 163, 0.3);
            transition: all 0.2s ease;
        }

        .carrinho-topo-btn:hover {
            background-color: var(--rosa-escuro);
        }

        .contador-itens {
            background-color: white;
            color: var(--rosa-escuro);
            border-radius: 50%;
            padding: 2px 7px;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            header {
                padding: 30px 20px 80px 20px;
            }
            .carrinho-topo-btn {
                position: absolute;
                top: auto;
                bottom: 20px;
                right: 50%;
                transform: translateX(50%);
                width: auto;
            }
            header .nome-loja {
                font-size: 2rem;
            }
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .vitrine {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .produto-card {
            background-color: var(--branco);
            border: 1px solid rgba(255, 143, 163, 0.2);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 143, 163, 0.08);
            padding: 30px 20px;
            text-align: center;
            box-sizing: border-box;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .produto-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(255, 143, 163, 0.2);
            border-color: var(--rosa-principal);
        }

        .img-container {
            width: 100%;
            height: auto;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .produto-card img {
            max-width: 55%;
            height: auto;
            border-radius: 12px;
            display: block;
        }

        .produto-card h3 {
            margin: 15px 0 8px 0;
            font-size: 1.4rem;
            color: var(--texto-escuro);
            font-weight: 700;
        }

        .produto-card .categoria {
            font-size: 0.85rem;
            color: var(--rosa-escuro);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .preco {
            font-size: 1.6rem;
            color: var(--texto-escuro);
            font-weight: 800;
            margin: 10px 0;
        }

        .produto-opcoes {
            width: 90%;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .opcao-titulo {
            font-size: 0.8rem;
            color: var(--texto-suave);
            font-weight: bold;
            text-align: left;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }

        .tamanhos-grid {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .btn-tamanho {
            background-color: var(--branco);
            border: 2px solid rgba(255, 143, 163, 0.3);
            color: var(--texto-escuro);
            padding: 8px 14px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-tamanho.selecionado {
            background-color: var(--rosa-principal);
            border-color: var(--rosa-principal);
            color: white;
        }

        .quantidade-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .quantidade-container input {
            width: 60px;
            padding: 8px;
            border: 1px solid rgba(255, 143, 163, 0.3);
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
        }

        .btn-comprar {
            background-color: var(--rosa-principal);
            color: var(--branco);
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 700;
            width: 90%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .carrinho-lateral {
            position: fixed;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100%;
            background-color: var(--branco);
            box-shadow: -5px 0 25px rgba(0,0,0,0.15);
            z-index: 2000;
            transition: right 0.3s ease;
            padding: 25px;
            box-sizing: border-box;
        }

        .carrinho-lateral.aberto {
            right: 0;
        }

        .btn-finalizar {
            background-color: #25d366;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 30px;
            display: block;
            text-align: center;
            font-weight: bold;
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <header>
        <h1 class="nome-loja">Prime Store</h1>
        <button class="carrinho-topo-btn" onclick="toggleCarrinho()">🛒 Meu Carrinho <span class="contador-itens" id="contador-itens">0</span></button>
    </header>

    <div class="container">
        </div>

    <div class="carrinho-lateral" id="carrinho-lateral">
        <button onclick="toggleCarrinho()">Fechar</button>
        <div id="carrinho-itens-lista"></div>
        <div class="carrinho-footer">
            <span id="valor-total">R$ 0,00</span>
            <a href="#" class="btn-finalizar" onclick="finalizarPedido(event)">✅ Finalizar Pedido via WhatsApp</a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://prime-store-53b31-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let carrinho = [];

        // CORREÇÃO DO WHATSAPP AQUI
        function finalizarPedido(e) {
            e.preventDefault();
            const numeroWhatsApp = "5589981527374";
            let msg = "Olá! Gostaria de comprar:%0A";
            carrinho.forEach(item => {
                msg += `- ${item.nome} (Tam ${item.tamanho}, Qtd ${item.qtd})%0A`;
            });
            window.open(`https://wa.me/${numeroWhatsApp}?text=${msg}`, '_blank');
        }

        function toggleCarrinho() {
            document.getElementById('carrinho-lateral').classList.toggle('aberto');
        }
    </script>
</body>
</html>
